<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>RAG 知识库助手</title>
  <style>
    :root {
      --bg: #0f172a;
      --surface: #1e293b;
      --surface-2: #334155;
      --border: #475569;
      --text: #f1f5f9;
      --text-muted: #94a3b8;
      --primary: #3b82f6;
      --primary-hover: #2563eb;
      --primary-glow: rgba(59, 130, 246, 0.3);
      --user-bubble: #3b82f6;
      --assistant-bubble: #1e293b;
      --system-bg: rgba(59, 130, 246, 0.1);
      --success: #22c55e;
      --error: #ef4444;
      --radius: 16px;
      --radius-sm: 8px;
    }
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      background: var(--bg);
      color: var(--text);
      font: 14px/1.6 -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, "PingFang SC", "Microsoft YaHei", sans-serif;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
    }
    header {
      background: var(--surface);
      border-bottom: 1px solid var(--border);
      padding: 12px 24px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 16px;
      position: sticky;
      top: 0;
      z-index: 100;
      backdrop-filter: blur(12px);
    }
    .logo {
      display: flex;
      align-items: center;
      gap: 10px;
    }
    .logo-icon {
      width: 36px;
      height: 36px;
      background: linear-gradient(135deg, var(--primary), #8b5cf6);
      border-radius: 10px;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 18px;
    }
    .logo-text {
      font-size: 18px;
      font-weight: 700;
      background: linear-gradient(135deg, var(--primary), #a78bfa);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
    }
    .logo-sub {
      font-size: 12px;
      color: var(--text-muted);
    }
    .header-actions {
      display: flex;
      gap: 8px;
    }
    .btn {
      border: none;
      border-radius: var(--radius-sm);
      padding: 8px 16px;
      cursor: pointer;
      font: inherit;
      font-size: 13px;
      font-weight: 500;
      transition: all 0.2s;
      display: flex;
      align-items: center;
      gap: 6px;
    }
    .btn-ghost {
      background: transparent;
      color: var(--text-muted);
      border: 1px solid var(--border);
    }
    .btn-ghost:hover {
      background: var(--surface-2);
      color: var(--text);
    }
    .btn-primary {
      background: var(--primary);
      color: #fff;
    }
    .btn-primary:hover {
      background: var(--primary-hover);
      box-shadow: 0 0 20px var(--primary-glow);
    }
    .btn:disabled {
      opacity: 0.5;
      cursor: not-allowed;
    }

    .layout {
      flex: 1;
      display: flex;
      flex-direction: column;
      max-width: 900px;
      width: 100%;
      margin: 0 auto;
      padding: 0 16px;
    }

    .chat-container {
      flex: 1;
      display: flex;
      flex-direction: column;
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      overflow: hidden;
      margin-bottom: 16px;
    }
    .chat-messages {
      flex: 1;
      overflow-y: auto;
      padding: 20px;
      display: flex;
      flex-direction: column;
      gap: 16px;
      scroll-behavior: smooth;
    }
    .chat-messages::-webkit-scrollbar {
      width: 6px;
    }
    .chat-messages::-webkit-scrollbar-track {
      background: transparent;
    }
    .chat-messages::-webkit-scrollbar-thumb {
      background: var(--border);
      border-radius: 3px;
    }

    .message {
      display: flex;
      gap: 12px;
      max-width: 85%;
      animation: fadeIn 0.3s ease;
    }
    @keyframes fadeIn {
      from { opacity: 0; transform: translateY(8px); }
      to { opacity: 1; transform: translateY(0); }
    }
    .message.user {
      align-self: flex-end;
      flex-direction: row-reverse;
    }
    .message.assistant {
      align-self: flex-start;
    }
    .message.system {
      align-self: center;
      max-width: 90%;
    }

    .avatar {
      width: 32px;
      height: 32px;
      border-radius: 50%;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 14px;
      flex-shrink: 0;
    }
    .message.user .avatar {
      background: linear-gradient(135deg, #3b82f6, #8b5cf6);
    }
    .message.assistant .avatar {
      background: linear-gradient(135deg, #22c55e, #06b6d4);
    }
    .message.system .avatar {
      background: var(--surface-2);
    }

    .bubble {
      border-radius: var(--radius);
      padding: 12px 16px;
      position: relative;
    }
    .message.user .bubble {
      background: var(--user-bubble);
      color: #fff;
      border-bottom-right-radius: 4px;
    }
    .message.assistant .bubble {
      background: var(--assistant-bubble);
      border: 1px solid var(--border);
      border-bottom-left-radius: 4px;
    }
    .message.system .bubble {
      background: var(--system-bg);
      border: 1px solid rgba(59, 130, 246, 0.2);
      font-size: 13px;
      color: var(--text-muted);
      text-align: center;
      border-radius: 20px;
      padding: 8px 20px;
    }

    .bubble-content {
      white-space: pre-wrap;
      word-break: break-word;
      line-height: 1.6;
    }
    .bubble-content p { margin: 0 0 8px 0; }
    .bubble-content p:last-child { margin-bottom: 0; }
    .bubble-content ul, .bubble-content ol {
      margin: 4px 0;
      padding-left: 20px;
    }
    .bubble-content code {
      background: rgba(255,255,255,0.1);
      padding: 2px 6px;
      border-radius: 4px;
      font-size: 13px;
    }
    .bubble-content pre {
      background: rgba(0,0,0,0.3);
      padding: 12px;
      border-radius: var(--radius-sm);
      overflow-x: auto;
      margin: 8px 0;
    }
    .bubble-content pre code {
      background: none;
      padding: 0;
    }
    .bubble-content table {
      border-collapse: collapse;
      margin: 8px 0;
      width: 100%;
      font-size: 13px;
    }
    .bubble-content th, .bubble-content td {
      border: 1px solid var(--border);
      padding: 6px 10px;
      text-align: left;
    }
    .bubble-content th {
      background: rgba(255,255,255,0.05);
      font-weight: 600;
    }
    .message.user .bubble-content code {
      background: rgba(255,255,255,0.2);
    }
    .message.user .bubble-content pre {
      background: rgba(0,0,0,0.2);
    }

    .bubble-meta {
      display: flex;
      align-items: center;
      gap: 8px;
      margin-top: 6px;
      font-size: 11px;
      color: var(--text-muted);
    }
    .message.user .bubble-meta {
      color: rgba(255,255,255,0.7);
      justify-content: flex-end;
    }

    .docs-toggle {
      background: none;
      border: none;
      color: var(--primary);
      cursor: pointer;
      font: inherit;
      font-size: 12px;
      padding: 4px 0;
      display: flex;
      align-items: center;
      gap: 4px;
    }
    .docs-toggle:hover {
      text-decoration: underline;
    }
    .docs-list {
      margin-top: 8px;
      padding-top: 8px;
      border-top: 1px solid var(--border);
    }
    .doc-item {
      display: flex;
      align-items: center;
      gap: 8px;
      padding: 6px 0;
      font-size: 12px;
      color: var(--text-muted);
    }
    .doc-item::before {
      content: '';
      width: 6px;
      height: 6px;
      background: var(--primary);
      border-radius: 50%;
      flex-shrink: 0;
    }

    .typing-indicator {
      display: flex;
      gap: 4px;
      padding: 8px 0;
    }
    .typing-indicator span {
      width: 8px;
      height: 8px;
      background: var(--text-muted);
      border-radius: 50%;
      animation: typing 1.4s infinite;
    }
    .typing-indicator span:nth-child(2) { animation-delay: 0.2s; }
    .typing-indicator span:nth-child(3) { animation-delay: 0.4s; }
    @keyframes typing {
      0%, 60%, 100% { transform: translateY(0); opacity: 0.4; }
      30% { transform: translateY(-6px); opacity: 1; }
    }

    .input-area {
      padding: 16px 20px;
      border-top: 1px solid var(--border);
      background: var(--surface);
      display: flex;
      gap: 12px;
      align-items: flex-end;
    }
    .input-area textarea {
      flex: 1;
      background: var(--bg);
      border: 1px solid var(--border);
      border-radius: 12px;
      padding: 12px 16px;
      color: var(--text);
      font: inherit;
      font-size: 14px;
      resize: none;
      min-height: 48px;
      max-height: 150px;
      transition: border-color 0.2s;
    }
    .input-area textarea:focus {
      outline: none;
      border-color: var(--primary);
      box-shadow: 0 0 0 3px var(--primary-glow);
    }
    .input-area textarea::placeholder {
      color: var(--text-muted);
      opacity: 0.6;
    }
    .send-btn {
      width: 48px;
      height: 48px;
      border-radius: 50%;
      border: none;
      background: var(--primary);
      color: #fff;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      transition: all 0.2s;
      flex-shrink: 0;
    }
    .send-btn:hover:not(:disabled) {
      background: var(--primary-hover);
      box-shadow: 0 0 20px var(--primary-glow);
      transform: scale(1.05);
    }
    .send-btn:disabled {
      opacity: 0.5;
      cursor: not-allowed;
    }
    .send-btn svg {
      width: 20px;
      height: 20px;
    }

    .status-bar {
      text-align: center;
      padding: 8px;
      font-size: 12px;
      color: var(--text-muted);
    }

    @media (max-width: 640px) {
      header { padding: 12px 16px; }
      .logo-text { font-size: 16px; }
      .message { max-width: 95%; }
      .input-area { padding: 12px; }
    }
  </style>
</head>
<body>

<header>
  <div class="logo">
    <div class="logo-icon">KB</div>
    <div>
      <div class="logo-text">RAG 知识库助手</div>
      <div class="logo-sub">Enterprise Knowledge Base Q&A</div>
    </div>
  </div>
  <div class="header-actions">
    <button class="btn btn-ghost" id="clear-chat">
      <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M3 6h18M19 6v14a2 2 0 01-2 2H7a2 2 0 01-2-2V6m3 0V4a2 2 0 012-2h4a2 2 0 012 2v2"/></svg>
      清空
    </button>
    <button class="btn btn-ghost" id="new-session">
      <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M12 5v14M5 12h14"/></svg>
      新会话
    </button>
  </div>
</header>

<div class="layout">
  <div class="chat-container">
    <div id="chat-log" class="chat-messages"></div>
    <div class="input-area">
      <textarea id="question" placeholder="输入您的问题..." rows="1"></textarea>
      <button class="send-btn" id="send-btn" title="发送 (Ctrl+Enter)">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M22 2L11 13M22 2l-7 20-4-9-9-4 20-7z"/></svg>
      </button>
    </div>
  </div>

  <div class="status-bar" id="status">就绪</div>
</div>

<script>
  const questionInput = document.getElementById("question");
  const sendBtn = document.getElementById("send-btn");
  const newSessionBtn = document.getElementById("new-session");
  const clearChatBtn = document.getElementById("clear-chat");
  const statusNode = document.getElementById("status");
  const chatLog = document.getElementById("chat-log");

  let sessionId = makeSessionId();

  function makeSessionId() {
    return "web-" + Date.now() + "-" + Math.random().toString(16).slice(2, 8);
  }

  function nowTime() {
    return new Date().toLocaleTimeString("zh-CN", { hour: "2-digit", minute: "2-digit" });
  }

  function uniqueDocs(docs) {
    const list = Array.isArray(docs) ? docs : [];
    const seen = new Set();
    const output = [];
    list.forEach((doc) => {
      const source = (doc && doc.source ? String(doc.source) : "").trim();
      const docId = (doc && doc.doc_id ? String(doc.doc_id) : "").trim();
      const key = (source || docId || "unknown").replaceAll("\\", "/").toLowerCase();
      if (seen.has(key)) return;
      seen.add(key);
      output.push({ source, doc_id: docId });
    });
    return output;
  }

  function escapeHtml(text) {
    const div = document.createElement("div");
    div.textContent = text;
    return div.innerHTML;
  }

  function formatContent(text) {
    if (!text) return "";
    let html = escapeHtml(text);
    html = html.replace(/```(\w*)\n([\s\S]*?)```/g, "<pre><code>$2</code></pre>");
    html = html.replace(/`([^`]+)`/g, "<code>$1</code>");
    html = html.replace(/\*\*(.+?)\*\*/g, "<strong>$1</strong>");
    html = html.replace(/\n/g, "<br>");
    return html;
  }

  function createMessage(role, text, docs) {
    const node = document.createElement("div");
    node.className = "message " + role;

    const avatar = document.createElement("div");
    avatar.className = "avatar";
    if (role === "user") avatar.textContent = "U";
    else if (role === "assistant") avatar.textContent = "AI";
    else avatar.textContent = "S";
    node.appendChild(avatar);

    const bubble = document.createElement("div");
    bubble.className = "bubble";

    const content = document.createElement("div");
    content.className = "bubble-content";
    content.innerHTML = formatContent(text || "");
    bubble.appendChild(content);

    if (role !== "system") {
      const meta = document.createElement("div");
      meta.className = "bubble-meta";
      meta.innerHTML = `<span>${nowTime()}</span>`;
      bubble.appendChild(meta);
    }

    const docList = uniqueDocs(docs);
    if (docList.length > 0) {
      const toggle = document.createElement("button");
      toggle.className = "docs-toggle";
      toggle.innerHTML = `引用 ${docList.length} 个文档 <svg width="10" height="10" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M6 9l6 6 6-6"/></svg>`;

      const docsList = document.createElement("div");
      docsList.className = "docs-list";
      docsList.style.display = "none";

      docList.forEach((doc, idx) => {
        const item = document.createElement("div");
        item.className = "doc-item";
        item.textContent = doc.source || doc.doc_id || "unknown";
        docsList.appendChild(item);
      });

      toggle.addEventListener("click", () => {
        const visible = docsList.style.display !== "none";
        docsList.style.display = visible ? "none" : "block";
        toggle.querySelector("svg").style.transform = visible ? "" : "rotate(180deg)";
      });

      bubble.appendChild(toggle);
      bubble.appendChild(docsList);
    }

    node.appendChild(bubble);
    return node;
  }

  function pushMessage(role, text, docs) {
    chatLog.appendChild(createMessage(role, text, docs));
    chatLog.scrollTop = chatLog.scrollHeight;
  }

  function showTyping() {
    const node = document.createElement("div");
    node.className = "message assistant";
    node.id = "typing-indicator";
    node.innerHTML = `
      <div class="avatar">AI</div>
      <div class="bubble">
        <div class="typing-indicator">
          <span></span><span></span><span></span>
        </div>
      </div>
    `;
    chatLog.appendChild(node);
    chatLog.scrollTop = chatLog.scrollHeight;
  }

  function hideTyping() {
    const el = document.getElementById("typing-indicator");
    if (el) el.remove();
  }

  function setBusy(busy, label) {
    sendBtn.disabled = busy;
    statusNode.textContent = label;
  }

  async function sendQuestion() {
    const question = questionInput.value.trim();
    if (!question) {
      statusNode.textContent = "请输入问题";
      return;
    }

    const base = window.location.origin;

    const payload = {
      question,
      session_id: sessionId,
      user_id: null,
      channel: "web"
    };

    pushMessage("user", question);
    questionInput.value = "";
    questionInput.style.height = "auto";
    setBusy(true, "思考中...");
    showTyping();

    try {
      const resp = await fetch(base + "/chat", {
        method: "POST",
        headers: { "Content-Type": "application/json" },
        body: JSON.stringify(payload)
      });
      hideTyping();
      if (!resp.ok) {
        const txt = await resp.text();
        throw new Error("HTTP " + resp.status + ": " + txt);
      }
      const data = await resp.json();
      if (data.session_id) {
        sessionId = data.session_id;
      }
      pushMessage("assistant", data.answer || "", data.used_docs || []);
      setBusy(false, "就绪");
    } catch (err) {
      hideTyping();
      pushMessage("system", "请求失败: " + (err && err.message ? err.message : String(err)));
      setBusy(false, "失败");
    }
  }

  questionInput.addEventListener("input", () => {
    questionInput.style.height = "auto";
    questionInput.style.height = Math.min(questionInput.scrollHeight, 150) + "px";
  });

  sendBtn.addEventListener("click", sendQuestion);
  questionInput.addEventListener("keydown", (event) => {
    if ((event.ctrlKey || event.metaKey) && event.key === "Enter") {
      event.preventDefault();
      sendQuestion();
    }
  });
  newSessionBtn.addEventListener("click", () => {
    sessionId = makeSessionId();
    pushMessage("system", "已创建新会话");
  });
  clearChatBtn.addEventListener("click", () => {
    chatLog.innerHTML = "";
    pushMessage("system", "已清空对话");
  });

  pushMessage("system", "您好！我是 RAG 知识库助手，请输入您的问题。");
</script>
</body>
</html>
